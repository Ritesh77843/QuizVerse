server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: quizverse-backend

  # ===== DATABASE =====
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:quizverse}
    username: ${DB_USERNAME:quizverse}
    password: ${DB_PASSWORD:quizverse}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===== JPA =====
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ===== FLYWAY =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ===== REDIS =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ===== FILE UPLOAD =====
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

  # ===== CACHE =====
  cache:
    type: redis
    redis:
      time-to-live: 300000

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForQuizVerseApplicationThatMustBeAtLeast256Bits}
  access-token-expiry-ms: 900000        # 15 minutes
  refresh-token-expiry-ms: 604800000    # 7 days

# ===== AI SERVICE =====
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}
  timeout-seconds: 60

# ===== FILE STORAGE =====
storage:
  upload-dir: ${UPLOAD_DIR:./uploads}
  allowed-extensions: pdf,png,jpg,jpeg,webp
  max-size-bytes: 20971520

# ===== WEBSOCKET =====
websocket:
  endpoint: /ws
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

# ===== CORS =====
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# ===== SPRINGDOC / SWAGGER =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== LOGGING =====
logging:
  level:
    com.quizverse: DEBUG
    org.springframework.security: INFO
    org.springframework.web.socket: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
