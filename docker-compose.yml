

services:

  # ===== POSTGRESQL =====
  postgres:
    image: postgres:16.2-alpine
    container_name: quizverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-quizverse}
      POSTGRES_USER: ${DB_USERNAME:-quizverse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quizverse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-quizverse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== REDIS =====
  redis:
    image: redis:7.2-alpine
    container_name: quizverse-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== SPRING BOOT BACKEND =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizverse-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-quizverse}
      DB_USERNAME: ${DB_USERNAME:-quizverse}
      DB_PASSWORD: ${DB_PASSWORD:-quizverse}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://host.docker.internal:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3


  # ===== NEXT.JS FRONTEND =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizverse-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/api/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
