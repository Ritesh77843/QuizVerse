version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: quizverse_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    # host.docker.internal allows Nginx to proxy to the Node.js apps running directly on Windows
    extra_hosts:
      - "host.docker.internal:host-gateway"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: quizverse_pgbouncer
    ports:
      - "6432:6432"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/quizverse
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=10000
      - DEFAULT_POOL_SIZE=100
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    container_name: quizverse_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: quizverse_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
