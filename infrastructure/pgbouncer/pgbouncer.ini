[databases]
# Replace quizverse_db with your actual production PostgreSQL database name
# format: alias = host=postgres port=5432 dbname=actual_db user=db_user
quizverse_db = host=postgres port=5432 dbname=quizverse user=postgres

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
admin_users = postgres

# Transaction pooling is best for serverless/highly-concurrent apps like Next.js & Prisma
pool_mode = transaction

# Maximum number of server connections PgBouncer will open to the Postgres database
max_client_conn = 10000
default_pool_size = 100
reserve_pool_size = 50
reserve_pool_timeout = 3

# Wait time before giving up on a client connection
client_login_timeout = 60

# TCP optimizations
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 30
